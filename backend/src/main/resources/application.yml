server:
  port: 8080
  error:
    include-message: always

logging:
  level:
    com.movieapp.backend.tmdb: DEBUG
    me.paulschwarz.springdotenv: DEBUG

springdotenv:
  # Load .env from the repo root even when running from backend/
  directory: "/Users/ibrus/Projects/movieApp"
  filename: ".env"
  ignore-if-missing: true

app:
  jwt:
    secret: ${JWT_SECRET:}
    expires-in-seconds: ${JWT_EXPIRES_IN_SECONDS:3600}

spring:
  docker:
    compose:
      # Our compose file lives in the repo root, not in backend/
      file: "../docker-compose.yml"
      # Keep shared dev services running when the app stops
      lifecycle-management: start-only
  jpa:
    hibernate:
      ddl-auto: update
